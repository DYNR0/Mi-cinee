<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Cine App</title>

<style>
body{margin:0;background:#141414;color:white;font-family:Arial}

/* NAV */
.nav{display:flex;justify-content:space-between;padding:10px;background:black;position:sticky;top:0}
input{padding:6px;border-radius:5px;border:none}

/* HERO */
.hero{display:flex;padding:20px}
.hero img{width:200px;border-radius:10px}
.info{margin-left:20px}
button{background:red;border:none;padding:10px;color:white;cursor:pointer;margin:5px}

/* FILAS */
h2{margin-left:15px}
.fila{display:flex;overflow-x:auto;padding:15px}
.card{margin-right:10px}
.card img{width:130px;border-radius:10px;cursor:pointer;transition:.3s}
.card img:hover{transform:scale(1.1)}

/* PLAYER GRANDE */
#player{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;z-index:10}
#player iframe{width:100%;height:100%}
#cerrar{position:absolute;top:15px;right:20px;font-size:30px;cursor:pointer}

/* MINI PLAYER */
#mini{position:fixed;bottom:10px;right:10px;width:220px;height:130px;display:none;background:black;border:2px solid white}
#mini iframe{width:100%;height:100%}
#miniCerrar{position:absolute;top:0;right:5px;cursor:pointer}

/* SALA */
#sala{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:20}
#sala video{width:70%;height:80%}
.chat{position:absolute;right:0;top:0;width:30%;height:100%;background:#111;padding:10px}
</style>
</head>

<body>

<div class="nav">
<h2>🎬 Mi Cine</h2>
<input type="text" placeholder="Buscar..." onkeyup="buscar(this.value)">
</div>

<!-- HERO -->
<div class="hero">
<img id="poster" src="https://via.placeholder.com/200x300">
<div class="info">
<h1 id="titulo">Selecciona una película</h1>
<p id="desc">Descripción</p>

<button onclick="ver()">▶ Ver ahora</button>
<button onclick="abrirRave()">👥 Ver en Rave</button>
<button onclick="abrirSala()">🎬 Mi Sala</button>

</div>
</div>

<!-- CATEGORÍAS -->
<div id="contenido"></div>

<!-- PLAYER -->
<div id="player">
<span id="cerrar" onclick="cerrar()">✖</span>
<iframe id="video"></iframe>
</div>

<!-- MINI -->
<div id="mini">
<span id="miniCerrar" onclick="cerrarMini()">✖</span>
<iframe id="miniVideo"></iframe>
</div>

<!-- SALA -->
<div id="sala">
<video id="videoSala" controls></video>

<div class="chat">
<h3>Chat</h3>
<div id="chat" style="height:80%;overflow:auto"></div>
<input id="mensaje" placeholder="Escribe...">
<button onclick="enviar()">Enviar</button>
</div>

<button onclick="cerrarSala()" style="position:absolute;top:10px;left:10px">✖</button>
</div>

<script>
const categorias=[
"Series","Acción","Animación","Romance","Terror","Comedia",
"Drama","Fantasía","Familia","Ciencia ficción",
"Documentales","Clásicos","K-Dramas","Anime"
];

let html="";
categorias.forEach(cat=>{
html+=`<h2>${cat}</h2><div class="fila">
<div class="card item" data="${cat}">
<img src="https://via.placeholder.com/130x190"
onclick="cargar('${cat}','Contenido de ${cat}','https://www.youtube.com/embed/dQw4w9WgXcQ','https://via.placeholder.com/200x300')">
</div></div>`;
});
document.getElementById("contenido").innerHTML=html;

let actual="";

function cargar(t,d,l,img){
document.getElementById("titulo").innerText=t;
document.getElementById("desc").innerText=d;
document.getElementById("poster").src=img;
actual=l;

document.getElementById("mini").style.display="block";
document.getElementById("miniVideo").src=l;
}

function ver(){
document.getElementById("player").style.display="block";
document.getElementById("video").src=actual;
}

function cerrar(){
document.getElementById("player").style.display="none";
document.getElementById("video").src="";
}

function cerrarMini(){
document.getElementById("mini").style.display="none";
document.getElementById("miniVideo").src="";
}

function abrirRave(){
if(!actual){alert("Selecciona algo primero");return;}
window.open("https://rave.io","_blank");
}

function abrirSala(){
if(!actual){alert("Selecciona algo primero");return;}
document.getElementById("sala").style.display="block";
let v=document.getElementById("videoSala");
v.src=actual;
v.play();
}

function cerrarSala(){
document.getElementById("sala").style.display="none";
}

function enviar(){
let txt=document.getElementById("mensaje").value;
let chat=document.getElementById("chat");
chat.innerHTML += "<p>"+txt+"</p>";
document.getElementById("mensaje").value="";
}

function buscar(txt){
let items=document.getElementsByClassName("item");
for(let i of items){
let c=i.getAttribute("data").toLowerCase();
i.style.display=c.includes(txt.toLowerCase())?"block":"none";
}
}
</script>

</body>
</html>
